name: CI (Python)

on:
  push:
    branches: [master]
    paths: ['folio_agent/**']
  pull_request:
    branches: [master]
    paths: ['folio_agent/**']

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: folio_agent
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'
          enable-cache: true
          cache-dependency-glob: 'folio_agent/uv.lock'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: uv sync

      - run: uv run ruff check .

      - run: uv run pytest tests/ --ignore=tests/test_integration.py
